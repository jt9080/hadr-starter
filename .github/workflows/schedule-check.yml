# Throwaway scheduling probe. Proves the `schedule` trigger fires on this repo
# now that (a) it's detached from the fork network and (b) this file was last
# committed by a resolvable GitHub account — an empty git user.email made the
# scheduler's actor null, which silently disables cron. Runs WITHOUT the
# publishing pipeline. It writes nothing and commits nothing (contents: read), so the live
# dashboard is untouched. Delete this file once a schedule-triggered run appears.
name: Schedule check

on:
  workflow_dispatch: {}
  schedule:
    # Every 10 min (offset off :00 to dodge congestion) for a fast signal.
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Prove the scheduler fired
        run: |
          echo "Schedule check ran."
          echo "event   = ${{ github.event_name }}"
          echo "time    = $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "If event=schedule above, cron is working on this repo. Nothing was published."
