# Second scheduling probe: a file that never existed while this repo was a
# fork, to test whether cron registration is corrupt per-workflow or dead
# repo-wide. Delete along with schedule-check.yml once schedules fire.
name: Cron canary

on:
  workflow_dispatch: {}
  schedule:
    - cron: "8,18,28,38,48,58 * * * *"

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: echo "cron canary fired, event=${{ github.event_name }} at $(date -u)"
